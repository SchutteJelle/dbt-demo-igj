# =============================================================================
# packages.yml
# Externe DBT packages die dit project gebruikt.
# Installeer met: dbt deps
#
# Leer-tip: dbt_utils is de meest gebruikte package in het DBT ecosysteem.
# Het bevat handige macros zoals generate_surrogate_key() en date_spine().
# =============================================================================

packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.0.0", "<2.0.0"]
