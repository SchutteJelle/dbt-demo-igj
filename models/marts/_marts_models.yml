# =============================================================================
# _marts_models.yml
# Documentatie en tests voor de marts laag modellen
# =============================================================================

version: 2

models:
  - name: mart_beschermende_plaatsingen
    description: >
      Finale presentatietabel voor dashboards en analyses van beschermende
      plaatsingen (onvrijwillige zorg conform Wvggz). Bevat alleen de meest
      actuele, niet-ingetrokken versie van elke plaatsing, verrijkt met
      berekende kolommen voor rapportage.

      Dit model is geconfigureerd als INCREMENTAL: bij elke kwartaallevering
      worden alleen nieuwe en gewijzigde records verwerkt, wat de pipeline
      snel houdt naarmate de dataset groeit.

      Eén rij = één actieve beschermende plaatsing (meest recente versie).

      Typische dashboardvragen die dit model beantwoordt:
      - Hoeveel actieve plaatsingen zijn er per zorgaanbieder?
      - Wat is de gemiddelde duur per machtigingsvorm?
      - Hoe ontwikkelt het aantal plaatsingen zich per kwartaal?
      - Welke diagnosegroepen komen het meest voor?

    columns:
      - name: bron_systeem_id
        description: >
          Unieke identifier van de plaatsing (uit het bronsysteem van de zorgaanbieder).
          Dit is de primary key van dit mart model - elke plaatsing komt precies één keer voor.
        tests:
          - not_null
          - unique

      - name: plaatsing_versie_sk
        description: Surrogate key verwijzend naar de actieve versie in int_plaatsingen_scd2.
        tests:
          - not_null
          - unique

      - name: bsn_geanonimiseerd
        description: Gehashte BSN van de cliënt. Gebruik voor cliënt-niveau analyses.
        tests:
          - not_null

      - name: zorgaanbieder_agb_code
        description: AGB-code van de zorgaanbieder. Dimensie voor aanbieder-niveau rapportage.
        tests:
          - not_null

      - name: machtigingsvorm
        description: Juridische grondslag. Dimensie voor maatregel-type analyses.
        tests:
          - not_null
          - accepted_values:
              values: ['IBS', 'RM', 'ZM']

      - name: startdatum_plaatsing
        description: Startdatum van de plaatsing.
        tests:
          - not_null

      - name: duur_plaatsing_dagen
        description: >
          Duur van de plaatsing in dagen. Bij nog actieve plaatsingen berekend
          t/m vandaag. Kan negatief zijn bij datumfouten (zie heeft_datumfout).
        tests:
          - not_null

      - name: duur_plaatsing_weken
        description: Duur in volledige weken (afgerond naar beneden).
        tests:
          - not_null

      - name: duur_categorie
        description: >
          Categorisering van de plaatsingsduur voor segmentatie in dashboards.
          Waarden: '1. Kort (0-3 dagen)', '2. Kort-middel (4-30 dagen)',
          '3. Middel (1-6 maanden)', '4. Lang (6-12 maanden)', '5. Zeer lang (> 1 jaar)'.
        tests:
          - not_null
          - accepted_values:
              values:
                - '1. Kort (0-3 dagen)'
                - '2. Kort-middel (4-30 dagen)'
                - '3. Middel (1-6 maanden)'
                - '4. Lang (6-12 maanden)'
                - '5. Zeer lang (> 1 jaar)'

      - name: is_actief_record
        description: >
          1 als de plaatsing momenteel actief is (geen einddatum of einddatum in toekomst).
          0 als de plaatsing is afgesloten. Gebruik als filter voor 'actief nu'-dashboards.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: is_langdurige_plaatsing
        description: 1 als de duur meer dan 365 dagen is. Indicator voor monitoring.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: diagnose_code
        description: ICD-10 code zonder punt (bijv. 'F200').
        tests:
          - not_null

      - name: diagnose_hoofdgroep
        description: >
          Eerste twee tekens van de ICD-10 code als diagnostische hoofdgroep
          (bijv. 'F2' voor schizofrenie-spectrum). Voor geaggregeerde diagnose-analyses.
        tests:
          - not_null

      - name: kwartaal_label
        description: Leesbaar kwartaallabel in format 'JJJJ-QK'. Bijv. '2024-Q3'.
        tests:
          - not_null

      - name: kwartaal_startdatum
        description: Eerste dag van het rapportagekwartaal. Gebruik voor datumfilters.
        tests:
          - not_null

      - name: kwartaal_sorteersleutel
        description: >
          Integer voor sortering van kwartalen (bijv. 20243 = 2024Q3).
          Gebruik in dashboards voor correcte chronologische sortering zonder
          datumconversie.
        tests:
          - not_null

      - name: heeft_datumfout
        description: >
          1 als einddatum_plaatsing vóór startdatum_plaatsing ligt.
          Datakwaliteitsindicator voor monitoring van aanleverproblemen.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: is_correctie
        description: 1 als dit record ooit gecorrigeerd is door de zorgaanbieder.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: versie_nummer
        description: Versienummer van de actieve versie. > 1 betekent dat er correcties zijn geweest.
        tests:
          - not_null

      - name: _mart_bijgewerkt_op
        description: Tijdstempel van de laatste keer dat dit record in de mart is bijgewerkt.
        tests:
          - not_null
