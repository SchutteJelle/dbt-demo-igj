# =============================================================================
# _staging_sources.yml
# Definitie van de ruwe brondata (SQL Server landingstabel)
#
# Leer-tip: Sources zijn het startpunt van de DBT lineage graph.
# Ze verwijzen naar tabellen die BUITEN DBT beheerd worden (ruwe brondata).
# Gebruik {{ source('naam', 'tabel') }} in je modellen om naar bronnen te verwijzen.
#
# Tests op sources draaien direct op de landingstabel - handig voor
# datakwaliteitscontroles bij binnenkomst van nieuwe kwartaalaanleveringen.
# =============================================================================

version: 2

sources:
  - name: igj_raw
    description: >
      Ruwe landingstabellen in SQL Server gevuld door het IGJ uploadportaal.
      Zorgaanbieders leveren elk kwartaal XML-bestanden aan die hier worden
      opgeslagen na parse en flattenering. De data bevat gegevens over
      beschermende plaatsingen (onvrijwillige zorg conform Wvggz).
    database: igj_dw          # SQL Server database naam
    schema: raw               # Schema naam in SQL Server
    loader: uploadportaal     # Wie laadt deze data (documentatie)
    loaded_at_field: aanleverdatum  # DBT gebruikt dit voor freshness checks

    # Freshness check: waarschuw als de data ouder is dan verwacht
    # Bij kwartaalaanleveringen verwachten we elke ~90 dagen nieuwe data
    freshness:
      warn_after: {count: 95, period: day}
      error_after: {count: 180, period: day}

    tables:
      - name: beschermende_plaatsingen
        description: >
          Alle aangeleverde beschermende plaatsingen per zorgaanbieder per kwartaal.
          Een plaatsing beschrijft een periode van onvrijwillige zorg voor een cliënt
          op basis van een Wvggz-machtiging. Correcties op eerdere kwartalen worden
          aangeleverd via een nieuw record met record_status = 'correctie'.

        columns:
          - name: id
            description: Surrogate key, auto-increment integer aangemaakt door het uploadportaal.
            tests:
              - not_null
              - unique

          - name: bsn_geanonimiseerd
            description: >
              Gehashte BSN van de cliënt (SHA-256 door de zorgaanbieder toegepast).
              Dit is geen gevoelig gegeven, maar wel herleidbaar als de hashsleutel
              bekend is. Behandel altijd als vertrouwelijk.
            tests:
              - not_null

          - name: zorgaanbieder_agb_code
            description: >
              AGB-code van de zorgaanbieder (8-cijferig, uitgegeven door Vektis).
              Identificeert uniek welke zorginstelling de plaatsing heeft aangeleverd.
            tests:
              - not_null

          - name: machtigingsvorm
            description: >
              De juridische grondslag van de onvrijwillige plaatsing conform de Wvggz.
              IBS = Inbewaringstelling (crisismaatregel, max 3 dagen, door burgemeester).
              RM  = Rechterlijke Machtiging (opgelegd door rechter, wet BOPZ-periode).
              ZM  = Zorgmachtiging (vervangt RM per inwerkingtreding Wvggz 2020).
            tests:
              - not_null
              - accepted_values:
                  values: ['IBS', 'RM', 'ZM', 'ibs', 'rm', 'zm']

          - name: startdatum_plaatsing
            description: Datum waarop de beschermende plaatsing is gestart.
            tests:
              - not_null

          - name: einddatum_plaatsing
            description: >
              Datum waarop de beschermende plaatsing is beëindigd.
              NULL betekent dat de plaatsing nog actief is op moment van aanlevering.

          - name: locatie_code
            description: >
              Interne locatiecode van de zorgaanbieder die aangeeft op welke
              locatie/afdeling de cliënt verblijft.
            tests:
              - not_null

          - name: diagnose_code
            description: >
              ICD-10 diagnosecode van de primaire diagnose die ten grondslag ligt
              aan de machtiging. Bijv. F20.0 = Paranoïde schizofrenie.
            tests:
              - not_null

          - name: kwartaal_levering
            description: >
              Het kwartaal waarvoor deze aanlevering is gedaan, in format 'JJJJQK'.
              Bijv. '2024Q3' = derde kwartaal van 2024. Merk op dat een record in
              kwartaal Q3 betrekking kan hebben op een plaatsing die in Q1 startte.
            tests:
              - not_null

          - name: aanleverdatum
            description: Datum waarop de zorgaanbieder de aanlevering heeft ingediend.
            tests:
              - not_null

          - name: bron_systeem_id
            description: >
              Unieke identifier van het record in het bronsysteem van de zorgaanbieder.
              Samen met kwartaal_levering identificeert dit een specifieke aanlevering.
              Bij een correctie bevat dit dezelfde waarde als het oorspronkelijke record.

          - name: record_status
            description: >
              Geeft aan wat voor soort aanlevering dit is.
              'nieuw'       = eerste aanlevering van dit record.
              'correctie'   = vervangt een eerder aangeleverd record (zelfde bron_systeem_id).
              'intrekking'  = het record moet worden ingetrokken / verwijderd.
            tests:
              - not_null
              - accepted_values:
                  values: ['nieuw', 'correctie', 'intrekking']
